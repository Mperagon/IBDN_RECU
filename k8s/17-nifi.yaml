apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:1.23.2
          ports:
            - containerPort: 8080
          env:
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
            - name: NIFI_WEB_HTTP_HOST
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /nifi-api/system-diagnostics
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 20
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data
      volumes:
        - name: nifi-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nifi
  namespace: flight-prediction
spec:
  selector:
    app: nifi
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
