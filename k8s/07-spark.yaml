# Spark Master
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
        - name: spark-master
          image: apache/spark:3.5.3
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
          ports:
            - containerPort: 8080
            - containerPort: 7077
          env:
            - name: SPARK_MODE
              value: master
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
          volumeMounts:
            - name: ivy2
              mountPath: /root/.ivy2
      volumes:
        - name: ivy2
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: flight-prediction
spec:
  selector:
    app: spark-master
  ports:
    - name: ui
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: rpc
      port: 7077
      targetPort: 7077
  type: NodePort
---
# Spark Worker 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker-1
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-worker-1
  template:
    metadata:
      labels:
        app: spark-worker-1
    spec:
      containers:
        - name: spark-worker
          image: apache/spark:3.5.3
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
          env:
            - name: SPARK_MODE
              value: worker
          resources:
            requests:
              memory: 2Gi
              cpu: 1000m
          volumeMounts:
            - name: ivy2
              mountPath: /root/.ivy2
      volumes:
        - name: ivy2
          emptyDir: {}
