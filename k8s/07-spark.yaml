# Spark History Server — visualiza event logs de jobs completados almacenados en MinIO.
# El DAG de entrenamiento escribe los logs en s3a://flight-data/spark-history
# via --conf spark.eventLog.enabled=true y --conf spark.eventLog.dir=...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      containers:
        - name: spark-history-server
          image: flight-prediction/spark:3.5.3
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          ports:
            - containerPort: 18080
          env:
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.history.fs.logDirectory=s3a://flight-data/spark-history
                -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000
                -Dspark.hadoop.fs.s3a.access.key=minioadmin
                -Dspark.hadoop.fs.s3a.secret.key=minioadmin
                -Dspark.hadoop.fs.s3a.path.style.access=true
                -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
                -Dspark.hadoop.fs.s3a.connection.ssl.enabled=false
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 18080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: flight-prediction
spec:
  selector:
    app: spark-history-server
  ports:
    - name: ui
      port: 18080
      targetPort: 18080
      nodePort: 30180
  type: NodePort
