---
# Spark Streaming Job
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-job
  namespace: flight-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-job
  template:
    metadata:
      labels:
        app: spark-job
    spec:
      containers:
        - name: spark-job
          image: apache/spark:3.5.3
          command:
            - /opt/spark/bin/spark-submit
            - --class
            - es.upm.dit.ging.predictor.MakePrediction
            - --master
            - spark://spark-master:7077
            - --deploy-mode
            - cluster
            - --packages
            - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
            - http://minio:9000/models/flight_prediction_2.12-0.1.jar
          env:
            - name: KAFKA_BROKER
              value: kafka:9092
            - name: SPARK_MASTER
              value: spark://spark-master:7077
            - name: MODELS_PATH
              value: s3a://models
            - name: MINIO_ENDPOINT
              value: http://minio:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
          volumeMounts:
            - name: ivy2
              mountPath: /root/.ivy2
      volumes:
        - name: ivy2
          emptyDir: {}
