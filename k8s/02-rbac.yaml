# ServiceAccount + Role + RoleBinding para que Airflow pueda crear pods
# via KubernetesPodOperator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow
  namespace: flight-prediction
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-pod-manager
  namespace: flight-prediction
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-pod-manager
  namespace: flight-prediction
subjects:
  - kind: ServiceAccount
    name: airflow
    namespace: flight-prediction
roleRef:
  kind: Role
  name: airflow-pod-manager
  apiGroup: rbac.authorization.k8s.io
