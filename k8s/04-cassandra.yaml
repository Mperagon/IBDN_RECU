apiVersion: v1
kind: Service
metadata:
  name: cassandra-headless
  namespace: flight-prediction
spec:
  clusterIP: None
  selector:
    app: cassandra
  ports:
    - port: 9042
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: flight-prediction
spec:
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: flight-prediction
spec:
  serviceName: cassandra-headless
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: flight-cluster
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
# Job que crea el keyspace y las tablas una vez Cassandra está listo
apiVersion: batch/v1
kind: Job
metadata:
  name: cassandra-init
  namespace: flight-prediction
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-cassandra
          image: cassandra:4.1
          command:
            - sh
            - -c
            - |
              until cqlsh cassandra -e "describe keyspaces" 2>/dev/null; do
                echo "Waiting for Cassandra..."; sleep 10
              done
      containers:
        - name: init
          image: cassandra:4.1
          command:
            - cqlsh
            - cassandra
            - -e
            - |
              CREATE KEYSPACE IF NOT EXISTS flight_data
                WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
              USE flight_data;
              CREATE TABLE IF NOT EXISTS origin_dest_distances (
                origin text, dest text, distance double,
                PRIMARY KEY ((origin, dest)));
              CREATE TABLE IF NOT EXISTS flight_predictions (
                uuid text PRIMARY KEY, prediction text, timestamp timestamp,
                origin text, dest text, carrier text, dep_delay double);
