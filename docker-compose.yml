networks:
  bigdata-net:
    driver: bridge

volumes:
  ivy2_cache:
  mongodb_data:
  cassandra_data:
  minio_data:
  nifi_data:
  postgres_airflow_data:
  postgres_mlflow_data:
  elasticsearch_data:

services:

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigdata-net

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - bigdata-net
    environment:
      - CASSANDRA_CLUSTER_NAME=flight-cluster
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    networks:
      - bigdata-net
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"
    command: >
      cqlsh cassandra -e
      "CREATE KEYSPACE IF NOT EXISTS flight_data WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
       USE flight_data;
       CREATE TABLE IF NOT EXISTS origin_dest_distances (origin text, dest text, distance double, PRIMARY KEY ((origin, dest)));
       CREATE TABLE IF NOT EXISTS flight_predictions (uuid text PRIMARY KEY, prediction text, timestamp timestamp, origin text, dest text, carrier text, dep_delay double);"

  nifi:
    image: apache/nifi:1.23.2
    container_name: nifi
    ports:
      - "8085:8080"
    networks:
      - bigdata-net
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTP_HOST=0.0.0.0
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nifi-api/system-diagnostics -o /dev/null || curl -sf http://localhost:8080/nifi/ -o /dev/null"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s

  nifi-init:
    image: python:3.12-slim
    container_name: nifi-init
    networks:
      - bigdata-net
    volumes:
      - ./docker/nifi/setup_flow.py:/setup/setup_flow.py:ro
    command: >
      bash -c "pip install requests -q && python3 /setup/setup_flow.py"
    depends_on:
      nifi:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: "no"

  cassandra-nifi-wait:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: cassandra-nifi-wait
    networks:
      - bigdata-net
    volumes:
      - ./docker/nifi/wait_for_data.py:/app/wait_for_data.py:ro
    environment:
      - CASSANDRA_HOST=cassandra
    command: python3 /app/wait_for_data.py
    depends_on:
      nifi-init:
        condition: service_completed_successfully
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata-net
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: python:3.12-slim
    container_name: minio-init
    networks:
      - bigdata-net
    volumes:
      - ./setup_minio_distributed.py:/setup_minio_distributed.py:ro
      - ./data/simple_flight_delay_features.jsonl.bz2:/mnt/raw.jsonl.bz2:ro
      - ./data/origin_dest_distances.jsonl:/mnt/distances.jsonl:ro
      - ./resources/train_spark_mllib_model.py:/mnt/train_script.py:ro
      - ./resources/create_iceberg_table.py:/mnt/create_iceberg_table.py:ro
    environment:
      - MINIO_ENDPOINT=minio:9000
      - SCRIPT_PATH=/mnt/train_script.py
      - ICEBERG_SCRIPT_PATH=/mnt/create_iceberg_table.py
      - DATA_PATH=/mnt/raw.jsonl.bz2
      - DISTANCES_PATH=/mnt/distances.jsonl
    command: python3 /setup_minio_distributed.py
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - bigdata-net
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    networks:
      - bigdata-net
    command:
      - bash
      - -c
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list 2>/dev/null; do
          echo 'Esperando Kafka...'
          sleep 3
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic flight-delay-ml-request --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic flight-predictions --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists --topic spark-flight-predictions --partitions 1 --replication-factor 1
        echo 'Topics Kafka creados OK'
    depends_on:
      - kafka
    restart: "no"

  hadoop-namenode:
    image: apache/hadoop:3
    container_name: hadoop-namenode
    hostname: hadoop-namenode
    networks:
      - bigdata-net
    ports:
      - "9870:9870"
    environment:
      - ENSURE_NAMENODE_DIR=/tmp/hadoop/dfs/name
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
    command: ["hdfs", "namenode"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9870/webhdfs/v1/?op=LISTSTATUS"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  hadoop-datanode:
    image: apache/hadoop:3
    container_name: hadoop-datanode
    hostname: hadoop-datanode
    networks:
      - bigdata-net
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
    command: ["hdfs", "datanode"]
    depends_on:
      hadoop-namenode:
        condition: service_healthy

  hadoop-resourcemanager:
    image: apache/hadoop:3
    container_name: hadoop-resourcemanager
    hostname: hadoop-resourcemanager
    networks:
      - bigdata-net
    ports:
      - "8088:8088"
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
    command: ["yarn", "resourcemanager"]
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/ws/v1/cluster/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  hadoop-nodemanager-1:
    build:
      context: .
      dockerfile: Dockerfile.nodemanager
    image: hadoop-nodemanager:latest
    container_name: hadoop-nodemanager-1
    hostname: hadoop-nodemanager-1
    networks:
      - bigdata-net
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
    command: ["yarn", "nodemanager"]
    depends_on:
      - hadoop-resourcemanager

  hadoop-nodemanager-2:
    build:
      context: .
      dockerfile: Dockerfile.nodemanager
    image: hadoop-nodemanager:latest
    container_name: hadoop-nodemanager-2
    hostname: hadoop-nodemanager-2
    networks:
      - bigdata-net
    volumes:
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
    command: ["yarn", "nodemanager"]
    depends_on:
      - hadoop-resourcemanager

  # Cliente Spark: solo para lanzar spark-submit hacia YARN
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: spark-custom:3.5.3
    container_name: spark-master
    networks:
      - bigdata-net
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop/conf
      - YARN_CONF_DIR=/etc/hadoop/conf
      - PYSPARK_PYTHON=python3
    volumes:
      - ./docker/hadoop/core-site.xml:/etc/hadoop/conf/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml
    command: tail -f /dev/null
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://hadoop-resourcemanager:8088/ws/v1/cluster/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      hadoop-resourcemanager:
        condition: service_healthy

  flink-jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    image: flink-custom:1.18.1
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    networks:
      - bigdata-net
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        python.executable: python3
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    image: flink-custom:1.18.1
    container_name: flink-taskmanager
    command: taskmanager
    networks:
      - bigdata-net
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        python.executable: python3
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-job:
    build:
      context: .
      dockerfile: Dockerfile.flink
    image: flink-custom:1.18.1
    container_name: flink-job
    networks:
      - bigdata-net
    environment:
      - KAFKA_BROKER=kafka:9092
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command:
      - bash
      - -c
      - |
        until python3 -c 'import mlflow,sys; mlflow.set_tracking_uri("http://mlflow:5000"); c=mlflow.tracking.MlflowClient(); v=c.get_latest_versions("sklearn_flight_model",stages=["Production"]); sys.exit(0 if v else 1)' 2>/dev/null; do
          echo 'Esperando modelo sklearn en MLflow registry (Production)...'
          sleep 30
        done
        RUNNING=$$(curl -sf http://flink-jobmanager:8081/jobs | python3 -c \
          "import sys,json; jobs=json.load(sys.stdin).get('jobs',[]); print('YES' if any(j.get('status')=='RUNNING' for j in jobs) else 'NO')" 2>/dev/null || echo NO)
        if [ "$$RUNNING" = "YES" ]; then
          echo 'Flink job ya en ejecucion, saltando submission'
          exit 0
        fi
        /opt/flink/bin/flink run \
          -m flink-jobmanager:8081 \
          --python /opt/flink-job/predict_flink.py
        JOB_ID=$$(curl -sf http://flink-jobmanager:8081/jobs | python3 -c \
          "import sys,json; jobs=[j for j in json.load(sys.stdin).get('jobs',[]) if j.get('status')=='RUNNING']; print(jobs[0]['id'] if jobs else '')" 2>/dev/null || echo "")
        if [ -z "$$JOB_ID" ]; then
          echo 'ERROR: job no arranco'
          exit 1
        fi
        echo "Job $$JOB_ID arrancado, monitorizando..."
        while true; do
          STATUS=$$(curl -sf "http://flink-jobmanager:8081/jobs/$$JOB_ID" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('state','UNKNOWN'))" 2>/dev/null || echo UNKNOWN)
          if [ "$$STATUS" != "RUNNING" ]; then
            echo "Job $$JOB_ID paso a estado $$STATUS, reiniciando..."
            exit 1
          fi
          sleep 30
        done
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    restart: on-failure

  spark-streaming:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: spark-custom:3.5.3
    container_name: spark-streaming
    networks:
      - bigdata-net
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop/conf
      - YARN_CONF_DIR=/etc/hadoop/conf
      - PYSPARK_PYTHON=python3
      - KAFKA_BROKER=kafka:9092
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./docker/hadoop/core-site.xml:/etc/hadoop/conf/core-site.xml
      - ./docker/hadoop/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml
      - ./docker/hadoop/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml
      - ./docker/hadoop/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml
    command:
      - bash
      - -c
      - |
        until python3 -c '
        import boto3, sys
        s3 = boto3.client("s3", endpoint_url="http://minio:9000",
                          aws_access_key_id="minioadmin",
                          aws_secret_access_key="minioadmin")
        r = s3.list_objects_v2(Bucket="flight-data", Prefix="iceberg/models/")
        sys.exit(0 if r.get("KeyCount", 0) > 0 else 1)
        ' 2>/dev/null; do
          echo 'Esperando modelo sklearn en Iceberg (minio_catalog.models)...'
          sleep 30
        done
        echo 'Modelo listo en Iceberg, arrancando Spark Structured Streaming en YARN cluster mode...'
        /opt/spark/bin/spark-submit \
          --master yarn \
          --deploy-mode cluster \
          --conf spark.yarn.appMasterEnv.KAFKA_BROKER=kafka:9092 \
          --conf spark.yarn.appMasterEnv.MLFLOW_S3_ENDPOINT_URL=http://minio:9000 \
          --conf spark.yarn.appMasterEnv.AWS_ACCESS_KEY_ID=minioadmin \
          --conf spark.yarn.appMasterEnv.AWS_SECRET_ACCESS_KEY=minioadmin \
          --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions \
          --conf spark.sql.catalog.minio_catalog=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.minio_catalog.type=hadoop \
          --conf "spark.sql.catalog.minio_catalog.warehouse=s3a://flight-data/iceberg" \
          --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000 \
          --conf spark.hadoop.fs.s3a.access.key=minioadmin \
          --conf spark.hadoop.fs.s3a.secret.key=minioadmin \
          --conf spark.hadoop.fs.s3a.path.style.access=true \
          --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem \
          --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false \
          http://minio:9000/flight-data/scripts/predict_spark_streaming.py
    depends_on:
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    restart: on-failure

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask
    ports:
      - "5001:5001"
    networks:
      - bigdata-net
    environment:
      - PROJECT_HOME=/app
      - KAFKA_BROKER=kafka:9092
      - SPARK_MASTER=spark://spark-master:7077
      - CASSANDRA_HOST=cassandra
      - MONGO_HOST=mongodb
    depends_on:
      cassandra-nifi-wait:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      mongodb:
        condition: service_started

  postgres-mlflow:
    image: postgres:15-alpine
    container_name: postgres-mlflow
    networks:
      - bigdata-net
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=mlflow
      - POSTGRES_DB=mlflow
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 10s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    networks:
      - bigdata-net
    depends_on:
      postgres-mlflow:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres-mlflow/mlflow
      --default-artifact-root s3://models/mlflow-artifacts
      --artifacts-destination s3://models/mlflow-artifacts
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin

  postgres-airflow:
    image: postgres:15-alpine
    container_name: postgres-airflow
    networks:
      - bigdata-net
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    networks:
      - bigdata-net
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
    depends_on:
      postgres-airflow:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
               (airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true)"
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    networks:
      - bigdata-net
    user: root
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./resources/airflow:/opt/airflow/dags-src:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: bash -c "cp /opt/airflow/dags-src/setup.py /opt/airflow/dags/setup.py && airflow webserver --port 8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    networks:
      - bigdata-net
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    networks:
      - bigdata-net
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    networks:
      - bigdata-net
    volumes:
      - ./docker/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
      - kafka

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    networks:
      - bigdata-net
    user: root
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=30
    volumes:
      - ./resources/airflow:/opt/airflow/dags-src:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: bash -c "cp /opt/airflow/dags-src/setup.py /opt/airflow/dags/setup.py && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
