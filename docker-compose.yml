networks:
  bigdata-net:
    driver: bridge

volumes:
  ivy2_cache:
  mongodb_data:
  cassandra_data:
  minio_data:
  postgres_airflow_data:
  elasticsearch_data:

services:

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bigdata-net

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - bigdata-net
    environment:
      - CASSANDRA_CLUSTER_NAME=flight-cluster
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - bigdata-net
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - bigdata-net
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - bigdata-net
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - .:/app

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: spark-worker-1
    networks:
      - bigdata-net
    user: root
    environment:
      - SPARK_MODE=worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master

  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: spark-worker-2
    networks:
      - bigdata-net
    user: root
    environment:
      - SPARK_MODE=worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master

  spark-job:
    image: apache/spark:3.5.3
    container_name: spark-job
    networks:
      - bigdata-net
    volumes:
      - ivy2_cache:/root/.ivy2
    user: root
    environment:
      - KAFKA_BROKER=kafka:9092
      - SPARK_MASTER=spark://spark-master:7077
      - MODELS_PATH=s3a://models
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: >
      /opt/spark/bin/spark-submit
      --class es.upm.dit.ging.predictor.MakePrediction
      --master spark://spark-master:7077
      --deploy-mode cluster
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
      s3a://models/flight_prediction_2.12-0.1.jar
    depends_on:
      - spark-master
      - kafka
    restart: on-failure

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask
    ports:
      - "5001:5001"
    networks:
      - bigdata-net
    environment:
      - PROJECT_HOME=/app
      - KAFKA_BROKER=kafka:9092
      - SPARK_MASTER=spark://spark-master:7077
      - CASSANDRA_HOST=cassandra
      - MONGO_HOST=mongodb
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_started
      mongodb:
        condition: service_started

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mlflow
    ports:
      - "5000:5000"
    networks:
      - bigdata-net
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - ./mlflow:/mlflow

  postgres-airflow:
    image: postgres:15-alpine
    container_name: postgres-airflow
    networks:
      - bigdata-net
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    networks:
      - bigdata-net
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
    depends_on:
      postgres-airflow:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
               (airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true)"
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    networks:
      - bigdata-net
    user: root
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
      - AIRFLOW__CORE__DAGS_FOLDER=/practica/resources/airflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/practica
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow webserver --port 8080
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    networks:
      - bigdata-net
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    networks:
      - bigdata-net
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    networks:
      - bigdata-net
    volumes:
      - ./docker/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
      - kafka

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    networks:
      - bigdata-net
    user: root
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=mysecretkey
      - AIRFLOW__CORE__DAGS_FOLDER=/practica/resources/airflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=30
    volumes:
      - .:/practica
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
