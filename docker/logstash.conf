input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["flight-delay-ml-request", "flight-predictions"]
    codec => "json"
    group_id => "logstash-flight"
    auto_offset_reset => "latest"
  }
}

filter {
  mutate {
    add_field => { "log_type" => "flight_prediction" }
  }

  date {
    match => ["timestamp", "ISO8601", "UNIX_MS"]
    target => "@timestamp"
    tag_on_failure => []
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "flight-predictions-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
